<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#1B3A4B"/>
  <!-- Water waves -->
  <path d="M0,320 Q75,300 150,320 T300,320 T450,320 T600,320 L600,400 L0,400Z" fill="#3D5A3A" opacity="0.4"/>
  <path d="M0,350 Q75,330 150,350 T300,350 T450,350 T600,350 L600,400 L0,400Z" fill="#3D5A3A" opacity="0.6"/>
  <!-- Chart line (ML prediction curve) -->
  <polyline points="80,260 140,220 200,240 260,180 320,160 380,200 440,140 500,120" fill="none" stroke="#C75B30" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="80" cy="260" r="5" fill="#C75B30"/>
  <circle cx="140" cy="220" r="5" fill="#C75B30"/>
  <circle cx="200" cy="240" r="5" fill="#C75B30"/>
  <circle cx="260" cy="180" r="5" fill="#C75B30"/>
  <circle cx="320" cy="160" r="5" fill="#C75B30"/>
  <circle cx="380" cy="200" r="5" fill="#C75B30"/>
  <circle cx="440" cy="140" r="5" fill="#C75B30"/>
  <circle cx="500" cy="120" r="5" fill="#C75B30"/>
  <!-- Chart axes -->
  <line x1="60" y1="100" x2="60" y2="280" stroke="#F4EFE3" stroke-width="1.5" opacity="0.3"/>
  <line x1="60" y1="280" x2="520" y2="280" stroke="#F4EFE3" stroke-width="1.5" opacity="0.3"/>
  <text x="40" y="60" font-family="Georgia, serif" font-size="28" fill="#F4EFE3" font-weight="600">FishCast</text>
</svg>
