<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#1B3A4B"/>
  <!-- Gear/cog -->
  <g transform="translate(300,210)">
    <circle cx="0" cy="0" r="60" fill="none" stroke="#445158" stroke-width="16"/>
    <circle cx="0" cy="0" r="30" fill="#1B3A4B" stroke="#445158" stroke-width="6"/>
    <!-- Gear teeth -->
    <rect x="-8" y="-76" width="16" height="20" rx="2" fill="#445158"/>
    <rect x="-8" y="56" width="16" height="20" rx="2" fill="#445158"/>
    <rect x="-76" y="-8" width="20" height="16" rx="2" fill="#445158"/>
    <rect x="56" y="-8" width="20" height="16" rx="2" fill="#445158"/>
    <rect x="42" y="-56" width="16" height="20" rx="2" fill="#445158" transform="rotate(45 50 -46)"/>
    <rect x="-58" y="36" width="16" height="20" rx="2" fill="#445158" transform="rotate(45 -50 46)"/>
    <rect x="-58" y="-56" width="16" height="20" rx="2" fill="#445158" transform="rotate(-45 -50 -46)"/>
    <rect x="42" y="36" width="16" height="20" rx="2" fill="#445158" transform="rotate(-45 50 46)"/>
  </g>
  <!-- Wrench -->
  <g transform="translate(420,160) rotate(30)">
    <rect x="-8" y="-80" width="16" height="120" rx="4" fill="#C75B30"/>
    <path d="M-20,-80 L20,-80 L16,-60 L-16,-60 Z" fill="#C75B30"/>
    <rect x="-4" y="40" width="8" height="30" rx="2" fill="#C75B30"/>
  </g>
  <!-- Small decorative bolts -->
  <circle cx="140" cy="140" r="6" fill="#C75B30" opacity="0.6"/>
  <circle cx="460" cy="300" r="6" fill="#C75B30" opacity="0.6"/>
  <circle cx="160" cy="300" r="4" fill="#F4EFE3" opacity="0.2"/>
  <circle cx="480" cy="140" r="4" fill="#F4EFE3" opacity="0.2"/>
  <text x="40" y="60" font-family="Georgia, serif" font-size="28" fill="#F4EFE3" font-weight="600">ATV Rebuild</text>
</svg>
