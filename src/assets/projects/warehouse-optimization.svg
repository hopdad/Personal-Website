<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F4EFE3"/>
  <!-- Warehouse grid/zones -->
  <rect x="60" y="100" width="100" height="80" rx="4" fill="#445158" opacity="0.7"/>
  <rect x="180" y="100" width="100" height="80" rx="4" fill="#445158" opacity="0.5"/>
  <rect x="300" y="100" width="100" height="80" rx="4" fill="#3D5A3A" opacity="0.6"/>
  <rect x="420" y="100" width="100" height="80" rx="4" fill="#3D5A3A" opacity="0.4"/>
  <rect x="60" y="220" width="100" height="80" rx="4" fill="#3D5A3A" opacity="0.4"/>
  <rect x="180" y="220" width="100" height="80" rx="4" fill="#3D5A3A" opacity="0.6"/>
  <rect x="300" y="220" width="100" height="80" rx="4" fill="#445158" opacity="0.5"/>
  <rect x="420" y="220" width="100" height="80" rx="4" fill="#445158" opacity="0.7"/>
  <!-- Flow arrows -->
  <line x1="130" y1="140" x2="170" y2="140" stroke="#C75B30" stroke-width="3" stroke-linecap="round"/>
  <polygon points="170,135 180,140 170,145" fill="#C75B30"/>
  <line x1="250" y1="140" x2="290" y2="140" stroke="#C75B30" stroke-width="3" stroke-linecap="round"/>
  <polygon points="290,135 300,140 290,145" fill="#C75B30"/>
  <line x1="370" y1="140" x2="410" y2="140" stroke="#C75B30" stroke-width="3" stroke-linecap="round"/>
  <polygon points="410,135 420,140 410,145" fill="#C75B30"/>
  <line x1="130" y1="260" x2="170" y2="260" stroke="#C75B30" stroke-width="3" stroke-linecap="round"/>
  <polygon points="170,255 180,260 170,265" fill="#C75B30"/>
  <line x1="250" y1="260" x2="290" y2="260" stroke="#C75B30" stroke-width="3" stroke-linecap="round"/>
  <polygon points="290,255 300,260 290,265" fill="#C75B30"/>
  <line x1="370" y1="260" x2="410" y2="260" stroke="#C75B30" stroke-width="3" stroke-linecap="round"/>
  <polygon points="410,255 420,260 410,265" fill="#C75B30"/>
  <text x="40" y="60" font-family="Georgia, serif" font-size="24" fill="#1B3A4B" font-weight="600">Warehouse Optimization</text>
</svg>
